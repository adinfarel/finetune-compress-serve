model:
  name_or_path: "meta-llama/Llama-3.2-1B"
  torch_dtype: "float16"
  attn_implementation: "eager"

data:
  dataset_name: "tatsu-lab/alpaca"
  max_seq_length: 512
  dataset_fraction: 1.0

training:
  method: "full"
  output_dir: "results/stage1/full_ft"
  num_train_epochs: 1
  per_device_train_batch_size: 2     
  gradient_accumulation_steps: 8      
  learning_rate: 2e-5                
  fp16: true
  bf16: false
  run_name: "full-ft-llama3.2-1b"