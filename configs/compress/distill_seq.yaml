method: "distill"

model:
  input_model_path: "results/stage1/qlora_merged"
  output_dir: "results/stage2/distill"
  dtype: "float16"

distill:
  teacher_model_path: "results/stage1/qlora_merged"
  student_model_path: "meta-llama/Llama-3.2-1B"
  dataset_name: "tatsu-lab/alpaca"
  dataset_fraction: 0.3
  max_seq_length: 256
  temperature: 3.0
  alpha: 0.7
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  fp16: true
  bf16: false